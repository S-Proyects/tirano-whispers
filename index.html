<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🤫 Tirano's Whispers 👁 DEMO</title>

<style>
* { box-sizing: border-box; }

body {
    background-color: #00008B;
    font-family: Comic Sans MS;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    margin: 0;
    padding: 20px 0;
}

.contenedor {
    background: #87CEFA;
    padding: 25px;
    border-radius: 12px;
    width: 90%;
    max-width: 400px;
    text-align: center;
}

input, button {
    width: 100%;
    height: 44px;
    margin-top: 12px;
    border-radius: 8px;
    font-size: 16px;
}

button {
    background: #4E97D1;
    border: none;
    cursor: pointer;
}

#btnCodigos {
    position: fixed;
    bottom: 20px;
    right: 15px;
    background: black;
    color: white;
    padding: 12px;
    border-radius: 50px;
    z-index: 1000;
    animation: pulso 1.5s infinite;
}

@keyframes pulso {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

#panelCodigos {
    position: fixed;
    top: 60px;
    right: 15px;
    background: #111;
    color: white;
    padding: 15px;
    border-radius: 12px;
    width: 220px;
    z-index: 1000;
}

.oculto {
    display: none;
}

#contenido {
    margin-top: 12px;
}

video, img {
    width: 100%;
    margin-top: 12px;
    border-radius: 10px;
}

.susurro {
    color: #111;
    font-style: italic;
    letter-spacing: 1.5px;
    opacity: 0;
    animation: aparecer 2s forwards;
}

@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(4px);
        filter: blur(2px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
    }
}
</style>
</head>

<body>

<button id="btnCodigos" onclick="mostrarCodigos()">📜 Códigos</button>

<div class="contenedor">
    <h1>🤫 Tirano's Whispers 👁️ (DEMO)</h1>

    <p>
        Bienvenid@ a la demo de "Tirano's Whispers"<br>
        Código inicial: <b>hello</b>
    </p>

    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="verificar()">Desbloquear</button>
    <button onclick="reiniciarProgreso()" style="background:red; color:white;">
        🔄 Reiniciar progreso
    </button>

    <p id="contador" style="color:#FFFF00; margin-top:10px;"></p>
    <p id="mensaje"></p>

    <div id="contenido"></div>
</div>

<div id="panelCodigos" class="oculto">
    <h3>📜 Desbloqueados</h3>
    <ul id="listaCodigos"></ul>
    <button onclick="cerrarPanel()">Cerrar</button>
</div>

<audio id="sonidoCorrecto" src="aw-shucks.mp3" preload="auto"></audio>
<audio id="sonidoError" src="you-bitch.mp3" preload="auto"></audio>

<script>
const password = document.getElementById("password");
const mensaje = document.getElementById("mensaje");
const contenido = document.getElementById("contenido");
const contador = document.getElementById("contador");
const listaCodigos = document.getElementById("listaCodigos");
const panelCodigos = document.getElementById("panelCodigos");

const sonidoCorrecto = document.getElementById("sonidoCorrecto");
const sonidoError = document.getElementById("sonidoError");

let codigosDesbloqueados = JSON.parse(localStorage.getItem("codigosDesbloqueados")) || [];

const secretos = {
    hello: {
        tipo: "texto",
        texto: "Hola! este es un codigo como de inicio o algo asi. aqui veras imagenes, fotos, videos y texto. Son interesantes, desbloquealos todos - Siguiente codigo: shucks"
    },
    creador: {
        tipo: "texto",
        texto: "Hola! Este es un mensaje del creador de la página (Samuel M.A). Escribo esto para agradecerte por visitar y probar la página! Está página la hice porque no sabía en qué invertir mi tiempo libre durante las vacaciones, y si, creo que lo invertí bien. De nuevo, gracias por visitar y probar este lugar. Hasta luego!"
    },
    shucks: {
        tipo: "imagen",
        archivo: "Torders.png",
        texto: "Aw shucks! - siguiente codigo: marvin"
    },
    marmota: {
        tipo: "imagen",
        archivo: "marmota.png",
        texto: "B-Bauro…? - siguiente codigo: minas"
    },
    marvin: {
        tipo: "imagen",
        archivo: "marvon.png",
        texto: "You bitch! - siguiente codigo: lirica"
    },
    lirica: {
        tipo: "video",
        archivo: "OficialShucks.mp4",
        texto: "Wow... que animacion más fluida, no es asi? - siguiente codigo: marmota"
    },
    minas: {
        tipo: "imagen",
        archivo: "CapVoid.png",
        texto: "¡Our brains are sweeping! - siguiente codigo: babyvoid"
    },
    babyvoid: {
        tipo: "imagen",
        archivo: "babyvoid.png",
        texto: "Que void - siguiente codigo - tears"
    },
    tears: {
        tipo: "imagen",
        archivo: "TBB_Deluxe_Icon.png",
        texto: "Deep down, i believe you'r a monster too - siguiente codigo: futuro"
    },
    futuro: {
      tipo: "texto",
      texto: "El futuro de la página será MUY diferente a lo que estás probando en estos momentos... La página se va a convertir en una historia, específicamente un ARG (Alternative Reality Game). De la HistoriA no puedo decir mucho por qué a la fecha en la que eScribo esto, se sigue consTrUyendo. Lo único que puedo deciR sobre la historia es que estará basada en uno de los códigos que usaste. Hasta luego! - siguiente codigo - creador"
    }
};

codigosDesbloqueados = codigosDesbloqueados.filter(c => secretos[c]);
localStorage.setItem("codigosDesbloqueados", JSON.stringify(codigosDesbloqueados));

function actualizarContador() {
    contador.textContent = `🔓 ${codigosDesbloqueados.length} / ${Object.keys(secretos).length} desbloqueados`;
}

function reproducir(audio) {
    audio.pause();
    audio.currentTime = 0;
    audio.play().catch(() => {});
}

document.body.addEventListener("click", () => {
    reproducir(sonidoCorrecto);
    sonidoCorrecto.pause();
    sonidoCorrecto.currentTime = 0;
}, { once: true });

function verificar() {
    const clave = password.value.toLowerCase();
    password.value = "";

    if (!secretos[clave]) {
        mensaje.textContent = "❌ Contraseña incorrecta";
        mensaje.style.color = "red";
        reproducir(sonidoError);
        return;
    }

    mensaje.textContent = "🎉 Contenido desbloqueado";
    mensaje.style.color = "green";
    reproducir(sonidoCorrecto);

    if (!codigosDesbloqueados.includes(clave)) {
        codigosDesbloqueados.push(clave);
        localStorage.setItem("codigosDesbloqueados", JSON.stringify(codigosDesbloqueados));
        actualizarContador();
    }

    const s = secretos[clave];
    contenido.innerHTML = "";

    if (s.tipo === "video") {
        contenido.innerHTML = `<video controls autoplay src="${s.archivo}"></video>`;
    }

    if (s.tipo === "imagen") {
        contenido.innerHTML = `<img src="${s.archivo}">`;
        if (s.texto) escribirSusurro(s.texto);
    }

    if (s.tipo === "texto") {
        escribirSusurro(s.texto);
    }
}

function reiniciarProgreso() {
    const confirmar = confirm("¿Estás segur@ de que quieres eliminar TODO tu progreso?");
    if (!confirmar) return;

    localStorage.removeItem("codigosDesbloqueados");
    codigosDesbloqueados = [];

    contenido.innerHTML = "";
    listaCodigos.innerHTML = "";
    mensaje.textContent = "🔄 Progreso reiniciado";
    mensaje.style.color = "orange";

    actualizarContador();
}

function escribirSusurro(texto) {
    const p = document.createElement("p");
    p.className = "susurro";
    contenido.appendChild(p);

    let i = 0;
    const intervalo = setInterval(() => {
        p.textContent += texto[i];
        i++;
        if (i >= texto.length) clearInterval(intervalo);
    }, 45);
}

function mostrarCodigos() {
    listaCodigos.innerHTML = codigosDesbloqueados.length
        ? codigosDesbloqueados.map(c => `<li>${c}</li>`).join("")
        : "<li>Ninguno aún</li>";
    panelCodigos.classList.remove("oculto");
}

function cerrarPanel() {
    panelCodigos.classList.add("oculto");
}

actualizarContador();
</script>

</body>
</html>
